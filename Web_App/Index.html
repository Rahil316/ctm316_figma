<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ctm316 — Color System Designer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎨</text></svg>" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      /* ── CSS Tokens ───────────────────────────────────────────── */
      :root {
        --bg-app: #0d0d0d;
        --bg-panel: #1e1e1e;
        --bg-card: #2b2b2b;
        --bg-input: #3c3c3c;
        --bg-hover: #444;
        --border: #444;
        --border-input: #555;
        --border-focus: #18a0fb;
        --text-primary: #ffffff;
        --text-muted: #b3b3b3;
        --text-dim: #888;
        --accent: #18a0fb;
        --accent-hover: #0089e8;
        --accent-glow: rgba(24, 160, 251, 0.3);
        --danger: #e74c3c;
        --danger-bg: rgba(231, 76, 60, 0.1);
        --success: #2ecc71;
        --warning: #f59e0b;
        --font: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        --font-mono: "SF Mono", "Cascadia Code", "Fira Code", monospace;
      }
      body.app-light-mode {
        --bg-app: #d2d8e5;
        --bg-panel: #ffffff;
        --bg-card: #f8f9fa;
        --bg-input: #ffffff;
        --bg-hover: #e9ecef;
        --border: #dee2e6;
        --border-input: #ced4da;
        --border-focus: #18a0fb;
        --text-primary: #212529;
        --text-muted: #6c757d;
        --text-dim: #adb5bd;
      }

      /* ── Base ─────────────────────────────────────────────────── */
      body {
        font-family: var(--font);
        color: var(--text-primary);
        background-color: var(--bg-app);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        min-height: 100vh;
        line-height: 1.6;
      }

      /* ── Sidebar toggle ───────────────────────────────────────── */
      app.sidebar-hidden { grid-template-columns: 0px 1fr; }
      app.sidebar-hidden aside { visibility: hidden; opacity: 0; width: 0; padding: 0; overflow: hidden; }

      /* ── Section collapse (grid-row animation) ────────────────── */
      .section-content { display: grid; grid-template-rows: 1fr; transition: grid-template-rows 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease; opacity: 1; }
      .section-content.collapsed { grid-template-rows: 0fr; opacity: 0; }
      .section-content > div { overflow: hidden; }

      /* ── Tabs ─────────────────────────────────────────────────── */
      .tab-panel { display: none; }
      .tab-panel.active { display: block; }
      .tab-panel.animate-in { animation: fadeSlideIn 0.25s ease; }
      .tab-btn.active { color: var(--accent) !important; border-bottom-color: var(--accent) !important; }

      /* ── Errors panel collapse ────────────────────────────────── */
      .errors-content { max-height: 0; overflow: hidden; transition: max-height 0.25s ease; }
      .errors-content.expanded { max-height: 400px; overflow-y: auto; }
      .errors-toggle.collapsed { transform: rotate(-90deg); }

      /* ── Drop overlay ─────────────────────────────────────────── */
      #drop-overlay { display: none; }
      #drop-overlay.active { display: flex; pointer-events: auto; }

      /* ── Keyframes ────────────────────────────────────────────── */
      @keyframes fadeSlideIn {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ── Tooltip pseudo-element ───────────────────────────────── */
      [data-tooltip] { position: relative; }
      [data-tooltip]::before {
        content: attr(data-tooltip);
        position: absolute;
        bottom: calc(100% + 6px);
        left: 50%;
        transform: translateX(-50%) translateY(4px);
        padding: 4px 8px;
        background-color: var(--bg-card);
        color: var(--text-primary);
        border: 1px solid var(--border);
        font-size: 11px;
        font-family: var(--font);
        border-radius: 6px;
        white-space: nowrap;
        opacity: 0;
        visibility: hidden;
        transition: all 0.15s ease;
        z-index: 100;
        pointer-events: none;
      }
      [data-tooltip]:hover::before { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }

      /* ── Copy success ─────────────────────────────────────────── */
      .copy-success { outline: 2px solid var(--success); outline-offset: 2px; border-radius: 4px; }

      /* ── Custom scrollbar ─────────────────────────────────────── */
      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #555; }

      /* ── Dialog backdrop ──────────────────────────────────────── */
      dialog::backdrop { background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }

      /* ── Print ────────────────────────────────────────────────── */
      @media print {
        aside, #mainActionBtns { display: none; }
      }
    </style>
  </head>

  <body>
    <app class="grid gap-2 grid-cols-[360px_1fr] grid-rows-[64px_1fr] p-2 h-[100vh] w-full">

      <header class="col-[1/3] flex items-center justify-between bg-[var(--bg-panel)] rounded-[10px] px-4 py-3 border border-[var(--border)]">
        <span class="flex items-center gap-2.5">
          <button id="toggleSidebarBtn"
            class="flex items-center justify-center w-10 h-10 rounded-[8px] bg-[var(--bg-input)] text-[var(--text-primary)] border border-[var(--border)] cursor-pointer transition-colors duration-150 hover:bg-[var(--bg-hover)]"
            title="Toggle Sidebar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="6" x2="21" y2="6" />
              <line x1="3" y1="12" x2="21" y2="12" />
              <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
          </button>
          <h2 class="text-[20px] font-bold leading-none">ctm316</h2>
        </span>
        <span class="flex items-center gap-2">
          <button id="toggleThemeBtn"
            class="flex items-center justify-center w-10 h-10 rounded-[10px] bg-[var(--bg-input)] text-[var(--text-primary)] border border-[var(--border)] cursor-pointer transition-colors duration-150 hover:bg-[var(--bg-hover)]"
            title="Toggle Light / Dark">
            <svg id="theme-icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <circle cx="12" cy="12" r="5" />
              <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
            </svg>
            <svg id="theme-icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
          </button>
          <span id="mainActionBtns" class="flex gap-2 flex-wrap"></span>
        </span>
      </header>

      <aside
        id="colorInputs"
        class="custom-scrollbar flex flex-col bg-[var(--bg-panel)] rounded-[16px] p-3 overflow-y-auto gap-2 border border-[var(--border)] transition-[visibility,opacity] duration-300">
      </aside>

      <main class="custom-scrollbar rounded-[16px] p-4 overflow-y-auto bg-[var(--bg-panel)] border border-[var(--border)]">
        <div class="tabs-navigation flex gap-1 mb-4 border-b-2 border-[var(--border)]">
          <button class="tab-btn active px-4 py-2 bg-transparent border-none border-b-2 border-transparent -mb-0.5 text-[13px] font-semibold text-[var(--text-muted)] cursor-pointer transition-all duration-150 rounded-t-[8px] hover:text-[var(--text-primary)] hover:bg-[var(--bg-hover)]" data-target="panel-colorRamps">Raw Colors</button>
          <button class="tab-btn px-4 py-2 bg-transparent border-none border-b-2 border-transparent -mb-0.5 text-[13px] font-semibold text-[var(--text-muted)] cursor-pointer transition-all duration-150 rounded-t-[8px] hover:text-[var(--text-primary)] hover:bg-[var(--bg-hover)]" data-target="panel-tokens-light">Light Theme</button>
          <button class="tab-btn px-4 py-2 bg-transparent border-none border-b-2 border-transparent -mb-0.5 text-[13px] font-semibold text-[var(--text-muted)] cursor-pointer transition-all duration-150 rounded-t-[8px] hover:text-[var(--text-primary)] hover:bg-[var(--bg-hover)]" data-target="panel-tokens-dark">Dark Theme</button>
        </div>
        <div id="rawColorsContainer"></div>
      </main>

    </app>

    <!-- Drag-drop overlay -->
    <div id="drop-overlay"
      class="fixed inset-0 bg-[rgba(13,13,13,0.88)] backdrop-blur-sm items-center justify-center z-[200] border-2 border-dashed border-[var(--accent)] m-3 rounded-[16px] pointer-events-none flex-col gap-4"
      aria-hidden="true">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
        <polyline points="17 8 12 3 7 8" />
        <line x1="12" y1="3" x2="12" y2="15" />
      </svg>
      <p class="text-[var(--text-primary)] text-base font-semibold">Drop JSON config to import</p>
    </div>

    <!-- Import confirmation dialog -->
    <dialog id="import-confirm-dialog"
      class="bg-[var(--bg-panel)] text-[var(--text-primary)] border border-[var(--border)] rounded-[16px] p-8 max-w-[380px] w-[90vw] text-center shadow-[0_24px_48px_rgba(0,0,0,0.6)]">
      <div class="w-16 h-16 bg-[rgba(245,158,11,0.1)] rounded-full flex items-center justify-center mx-auto mb-4 text-[var(--warning)]">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
          <line x1="12" y1="9" x2="12" y2="13" />
          <line x1="12" y1="17" x2="12.01" y2="17" />
        </svg>
      </div>
      <h2 class="text-[18px] font-bold mb-2.5">Overwrite current config?</h2>
      <p class="text-[13px] text-[var(--text-muted)] leading-relaxed mb-6">You have unsaved changes. Importing will replace all color groups and roles.</p>
      <div class="flex flex-col gap-2.5">
        <button id="import-dialog-overwrite"
          class="w-full h-10 px-4 bg-[var(--accent)] text-white rounded-[10px] text-[13px] font-semibold cursor-pointer transition-colors duration-150 hover:bg-[var(--accent-hover)] shadow-[0_4px_12px_var(--accent-glow)]">
          Import &amp; Overwrite
        </button>
        <button id="import-dialog-cancel"
          class="w-full h-10 px-4 bg-[var(--bg-input)] text-[var(--text-primary)] border border-[var(--border)] rounded-[10px] text-[13px] font-semibold cursor-pointer transition-colors duration-150 hover:bg-[var(--bg-hover)]">
          Cancel
        </button>
      </div>
    </dialog>

  </body>

  <script src="JS/Utils.js"></script>
  <script src="JS/ClrGen.js"></script>
  <script src="JS/UiGen.js"></script>
  <script src="JS/DocGen.js"></script>
  <script>
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", initializeColorControls);
    } else {
      initializeColorControls();
    }

    const toggleThemeBtn = document.getElementById("toggleThemeBtn");
    const sunIcon = document.getElementById("theme-icon-sun");
    const moonIcon = document.getElementById("theme-icon-moon");
    let isLight = false;

    toggleThemeBtn.onclick = () => {
      isLight = !isLight;
      document.body.classList.toggle("app-light-mode", isLight);
      sunIcon.style.display = isLight ? "block" : "none";
      moonIcon.style.display = isLight ? "none" : "block";
    };
  </script>
</html>
